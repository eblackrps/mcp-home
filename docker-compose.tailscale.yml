services:
  mcp-home:
    build: .
    container_name: mcp-home
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_HTTP_TOOL_PROFILE: public-safe
      NOTES_DIR: /app/notes
      HOMELAB_STATUS_PATH: /app/data/homelab-status.json
      WINDOWS_HOST_STATUS_PATH: /app/data/local/windows-host-status.json
      SNAPSHOT_STATUS_PATH: /app/data/local/snapshot-status.json
      PLEX_LIBRARY_INDEX_PATH: /app/data/local/plex-library-index.json
      MCP_OAUTH_STATE_PATH: /app/state/oauth-state.json
      MCP_AUDIT_LOG_PATH: /app/logs/mcp-audit.log
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
      - ./notes:/app/notes:ro
      - ./state:/app/state
    expose:
      - "8787"

  caddy:
    image: caddy:2
    container_name: mcp-home-caddy-tailscale
    restart: unless-stopped
    depends_on:
      mcp-home:
        condition: service_healthy
    ports:
      - "127.0.0.1:8788:80"
    volumes:
      - ./Caddyfile.tailscale:/etc/caddy/Caddyfile:ro
