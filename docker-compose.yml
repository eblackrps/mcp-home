services:
  mcp-home:
    build: .
    container_name: mcp-home
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NOTES_DIR: /app/notes
      HOMELAB_STATUS_PATH: /app/data/homelab-status.json
      WINDOWS_HOST_STATUS_PATH: /app/data/local/windows-host-status.json
      PLEX_LIBRARY_INDEX_PATH: /app/data/local/plex-library-index.json
      MCP_OAUTH_STATE_PATH: /app/state/oauth-state.json
      MCP_AUDIT_LOG_PATH: /app/logs/mcp-audit.log
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
      - ./notes:/app/notes:ro
      - ./state:/app/state
    expose:
      - "8787"

  caddy:
    image: caddy:2
    container_name: mcp-home-caddy
    restart: unless-stopped
    depends_on:
      mcp-home:
        condition: service_healthy
    environment:
      MCP_DOMAIN: ${MCP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
